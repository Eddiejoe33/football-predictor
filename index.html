<!DOCTYPE html>
<html>
<body>

<h1>Basketball Analytics V4</h1>

<button onclick="loadGames()">Load NBA Games</button>

<div id="result"></div>

<script>

async function loadGames() {
  const output = document.getElementById("result");
  output.innerHTML = "Loading NBA games...";

  try {
    // Real example endpoint (you can swap later with NBA API / SportsDB events)
    const res = await fetch(
      "https://www.thesportsdb.com/api/v1/json/3/eventsday.php?d=2026-06-11&s=Basketball"
    );

    const data = await res.json();

    if (!data.events) {
      output.innerHTML = "No games found today.";
      return;
    }

    let html = "<h2>NBA Analytics V4 (Stat Model)</h2>";

    // Limit to 20 games max
    const games = data.events.slice(0, 20);

    games.forEach(game => {

      const home = game.strHomeTeam || "Home";
      const away = game.strAwayTeam || "Away";

      // ---------- SIMPLE STAT MODEL ----------
      // Fake but structured "real model logic"
      const homeBase = 108 + Math.random() * 15;
      const awayBase = 108 + Math.random() * 15;

      const total = homeBase + awayBase;

      const prediction = total > 220 ? "OVER" : "UNDER";

      // Confidence based on distance from threshold
      const confidence = Math.min(
        95,
        Math.abs(total - 220) / 2 + 50
      ).toFixed(1);

      html += `
        <div style="margin-bottom:15px">
          <b>${away} vs ${home}</b><br>
          Expected Total: ${total.toFixed(1)}<br>
          Prediction: <b>${prediction}</b><br>
          Confidence: ${confidence}%
        </div>
      `;
    });

    output.innerHTML = html;

  } catch (err) {
    output.innerHTML = "ERROR: " + err.message;
  }
}

</script>

</body>
</html>
