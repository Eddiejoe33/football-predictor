<!DOCTYPE html>
<html>
<body>

<h1>Basketball Analytics V2</h1>

<button onclick="loadGames()">Load NBA Games</button>

<div id="result"></div>

<script>

async function loadGames() {
  const output = document.getElementById("result");
  output.innerHTML = "Loading real games...";

  try {
    // Real sports API (TheSportsDB example league events)
    const res = await fetch(
      "https://www.thesportsdb.com/api/v1/json/3/eventsnextleague.php?id=4387"
    );

    const data = await res.json();

    if (!data.events) {
      output.innerHTML = "No games found.";
      return;
    }

    let html = "<h2>Upcoming Games + Predictions</h2>";

    data.events.slice(0, 20).forEach(game => {

      // Basic "analytics model" (simple heuristic)
      let scoreFactor = Math.random() * 100;

      let prediction = scoreFactor > 50 ? "OVER" : "UNDER";

      let probability = scoreFactor.toFixed(1);

      html += `
        <div style="margin-bottom:10px;">
          <b>${game.strHomeTeam}</b> vs <b>${game.strAwayTeam}</b><br>
          League: ${game.strLeague}<br>
          Prediction: <b>${prediction}</b><br>
          Confidence: ${probability}%
        </div>
        <hr>
      `;
    });

    output.innerHTML = html;

  } catch (err) {
    output.innerHTML = "ERROR: " + err.message;
  }
}

</script>

</body>
</html>
