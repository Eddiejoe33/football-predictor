<!DOCTYPE html>
<html>
<body>

<h1>Football Predictor</h1>

<button onclick="loadMatches()">Click Me</button>

<div id="result"></div>

<script>
const API_KEY = "6ae38e4a441346f3aa40154d5a852739";

async function loadMatches() {
  const output = document.getElementById("result");

  output.innerHTML = "Request starting...";

  try {
    const res = await fetch("https://api.football-data.org/v4/matches", {
      headers: {
        "X-Auth-Token": API_KEY
      }
    });

    output.innerHTML =
      "Status Code: " + res.status + "<br>Loading response...";

    const text = await res.text();

    output.innerHTML += "<br><pre>" + text + "</pre>";

  } catch (err) {
    output.innerHTML = "ERROR: " + err.message;
  }
}
</script>

</body>
</html>
