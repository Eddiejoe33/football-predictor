<!DOCTYPE html>
<html>
<body>

<h1>Football Predictor</h1>

<button onclick="loadMatches()">Click Me</button>

<div id="result"></div>

<script>

async function loadMatches() {
  const output = document.getElementById("result");

  output.innerHTML = "Loading matches...";

  try {
    const res = await fetch("https://www.thesportsdb.com/api/v1/json/123/eventsnextleague.php?id=4328");

    const data = await res.json();

    let html = "<h3>Upcoming Matches</h3>";

    data.events.forEach(match => {
      html += `
        <p>
          <b>${match.strHomeTeam}</b>
          vs
          <b>${match.strAwayTeam}</b>
          <br>
          Date: ${match.dateEvent}
        </p>
        <hr>
      `;
    });

    output.innerHTML = html;

  } catch (err) {
    output.innerHTML = "ERROR: " + err.message;
  }
}

</script>

</body>
</html>
