<!DOCTYPE html>
<html>
<body>

<h1>Basketball Predictor</h1>

<button onclick="loadBasketball()">Load Basketball Leagues</button>

<div id="result"></div>

<script>

async function loadBasketball() {
  const output = document.getElementById("result");

  try {
    const res = await fetch(
      "https://www.thesportsdb.com/api/v1/json/123/all_leagues.php"
    );

    const data = await res.json();

    let html = "<h2>Basketball Leagues</h2>";

    const leagues = data.leagues.filter(
      league => league.strSport === "Basketball"
    );

    leagues.forEach(league => {
      html += `<p>${league.idLeague} - ${league.strLeague}</p>`;
    });

    output.innerHTML = html;

  } catch (err) {
    output.innerHTML = "ERROR: " + err.message;
  }
}

</script>

</body>
</html>
