<!DOCTYPE html>
<html>
<body>

<h1>Basketball Predictor (REAL NBA)</h1>

<button onclick="loadGames()">Load NBA Games</button>

<div id="result"></div>

<script>

async function loadGames() {
  const output = document.getElementById("result");
  output.innerHTML = "Loading NBA games...";

  try {
    const res = await fetch(
      "https://www.thesportsdb.com/api/v1/json/3/eventsnextleague.php?id=4387"
    );

    const data = await res.json();

    if (!data.events) {
      output.innerHTML = "No NBA games found right now.";
      return;
    }

    let html = "<h2>NBA Upcoming Games</h2>";

    data.events.slice(0, 20).forEach(game => {
      html += `
        <p>
          ${game.strHomeTeam} vs ${game.strAwayTeam}<br>
          Date: ${game.dateEvent}
        </p>
      `;
    });

    output.innerHTML = html;

  } catch (err) {
    output.innerHTML = "ERROR: " + err.message;
  }
}

</script>

</body>
</html>
