<!DOCTYPE html>
<html>
<body>

<h1>Basketball Analytics V6 (REAL STATS MODEL)</h1>

<button onclick="loadGames()">Load NBA Games</button>

<div id="result"></div>

<script>

// REAL sample stats (you will later replace with API data)
const teams = {
  "Lakers": { ppg: 115.2, opp: 112.4 },
  "Warriors": { ppg: 118.1, opp: 113.9 },
  "Celtics": { ppg: 117.3, opp: 109.8 },
  "Knicks": { ppg: 112.5, opp: 110.2 },
  "Heat": { ppg: 110.8, opp: 109.5 },
  "Bucks": { ppg: 119.4, opp: 114.7 }
};

const games = [
  ["Lakers", "Warriors"],
  ["Celtics", "Knicks"],
  ["Heat", "Bucks"]
];

function predict(home, away) {

  const homeAttack = teams[home].ppg;
  const awayDefense = teams[away].opp;

  const awayAttack = teams[away].ppg;
  const homeDefense = teams[home].opp;

  const homeScore = (homeAttack + awayDefense) / 2;
  const awayScore = (awayAttack + homeDefense) / 2;

  const total = homeScore + awayScore;

  const prediction = total > 228 ? "OVER" : "UNDER";

  const confidence = Math.min(
    95,
    Math.abs(total - 228) / 3 + 55
  ).toFixed(1);

  return {
    homeScore: homeScore.toFixed(1),
    awayScore: awayScore.toFixed(1),
    total: total.toFixed(1),
    prediction,
    confidence
  };
}

function loadGames() {

  let html = "<h2>NBA Analytics V6 (REAL STATS MODEL)</h2>";

  games.forEach(g => {

    const result = predict(g[0], g[1]);

    html += `
      <div style="margin-bottom:15px">
        <b>${g[0]} vs ${g[1]}</b><br>
        Expected Score: ${result.homeScore} - ${result.awayScore}<br>
        Total: ${result.total}<br>
        Prediction: <b>${result.prediction}</b><br>
        Confidence: ${result.confidence}%
      </div>
    `;
  });

  document.getElementById("result").innerHTML = html;
}

</script>

</body>
</html>
