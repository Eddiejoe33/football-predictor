<!DOCTYPE html>
<html>
<body>

<h1>Basketball Analytics V1</h1>

<button onclick="loadGames()">Load Games</button>

<div id="result"></div>

<script>

async function loadGames() {

  const output = document.getElementById("result");

  output.innerHTML = "Loading...";

  try {

    const res = await fetch(
      "https://www.thesportsdb.com/api/v1/json/3/all_leagues.php"
    );

    const data = await res.json();

    let html = "<h2>Demo Predictions</h2>";

    const teams = [
      "Lakers vs Warriors",
      "Celtics vs Knicks",
      "Heat vs Bucks",
      "Nuggets vs Suns",
      "Mavericks vs Clippers"
    ];

    teams.forEach(game => {

      const prediction =
        Math.random() > 0.5 ? "OVER" : "UNDER";

      html += `
        <p>
          ${game}<br>
          Prediction: <b>${prediction}</b>
        </p>
      `;
    });

    output.innerHTML = html;

  } catch(err) {

    output.innerHTML = err.message;

  }

}

</script>

</body>
</html>
